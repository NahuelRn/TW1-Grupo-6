
# La URL apunta a tu localhost en el puerto 3306 (donde est· tu Docker)
# El "createDatabaseIfNotExist=true" es magia pura: si la BD no existe, Spring la crea sola.
spring.datasource.url=jdbc:mysql://localhost:3306/cartas_del_reino?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# CREDENCIALES (Revis· tu archivo .env)
# ===============================
# Ac· van el usuario y contraseÒa de tu MySQL de Docker.
# Por lo general en la facu usan root y root, o root y test.
spring.datasource.username=root
spring.datasource.password=rootpassword

# ===============================
# CONFIGURACI”N DE HIBERNATE (El "Motor")
# ===============================
# Le decimos explÌcitamente que estamos usando MySQL versiÛn 8
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Muestra en la consola el SQL que ejecuta por detr·s (muy ˙til para debuggear)
spring.jpa.show-sql=true

# Crea las tablas autom·ticamente en base a tus clases @Entity
spring.jpa.hibernate.ddl-auto=create

# Ejecuta el archivo data.sql apenas termina de crear las tablas
spring.sql.init.mode=always