<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Colección - MythicStack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}" />
    <style>
        body { background-color: #121212; color: #e5a93b; }

        .mythic-panel {
            border: 2px solid #444;
            padding: 10px;
            border-radius: 10px;
            background: rgba(34, 34, 34, 0.82);
            backdrop-filter: blur(4px);
            height: 100%;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
        }
        .mythic-panel:hover {
            transform: translateY(-5px);
        }

        .carta-activa {
            border-color: #d4af37;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }
        .carta-apagada {
            opacity: 0.35;
            filter: grayscale(100%);
        }

        .carta-img {
            width: 100%;
            height: auto;
            aspect-ratio: 7 / 10;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid #000;
        }

        .placeholder-arte {
            height: 130px;
            background-color: #1a1a1a;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px dashed #555;
            color: #666;
        }

        .carta-nombre {
            font-size: 0.8rem;
        }

        .carta-desc {
            font-size: 0.7rem;
            min-height: 32px;
        }
        a.btn.btn-outline-warning {
            font-family: 'Montserrat', sans-serif;
            border: 2.7px solid #e5a93b;
            padding: 10px 20px;
            font-size: 20px;
            border-radius: 5px;
            background-color: #131316;
            color: #e5a93b;
            box-shadow: 0px 0px 10px 0px rgb(229 169 59 / 16%);
            transition: all 0.2s ease-in-out;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 35px;
        }

        a.btn.btn-outline-warning:hover {
            background-color: #e5a93b;
            color: #101010;
            transform: translateY(-3px);
            box-shadow: 0px 0px 20px rgba(229, 169, 59, 0.4);
        }
    </style>
</head>
<body th:style="|background-image: url('@{/img/Coleccion.jpg}'); background-size: cover; background-position: center; background-attachment: fixed;|">
<main class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <a th:href="@{/lobby}" class="btn btn-outline-warning">
            Volver al lobby
        </a>
        <h2 class="text-center flex-grow-1 mb-0 fw-bold" style="color: var(--game-epic, #d4af37);">Tu Colección</h2>
        <span class="d-none d-md-inline" style="width: 140px;"></span>
    </div>

    <div class="row">
        <div th:each="carta : ${todasLasCartas}" class="col-6 col-sm-4 col-md-3 col-lg-2 mb-4 d-flex">

            <div th:with="cantidad=${misCantidades.get(carta.id) != null ? misCantidades.get(carta.id) : 0}"
                 th:classappend="${cantidad > 0} ? 'carta-activa' : 'carta-apagada'"
                 class="mythic-panel text-center position-relative w-100">

        <span th:if="${cantidad > 0}"
              class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
              style="z-index: 10; box-shadow: 0 0 5px #000; font-size: 0.65rem;"
              th:text="'x' + ${cantidad}">
        </span>

                <div class="mb-2 w-100">
                    <img th:if="${carta.imagen != null and not #strings.isEmpty(carta.imagen)}"
                         th:src="@{'/img/' + ${carta.imagen}}"
                         th:alt="${carta.nombre}"
                         class="carta-img shadow">

                    <div th:unless="${carta.imagen != null and not #strings.isEmpty(carta.imagen)}"
                         class="placeholder-arte shadow w-100">
                        <small>Arte no disponible</small>
                    </div>
                </div>

                <h5 class="text-uppercase fw-bold mb-1 carta-nombre" th:text="${carta.nombre}">Nombre</h5>

                <div class="mb-1">
                    <span class="badge text-bg-warning" style="font-size: 0.6rem;" th:text="${carta.rareza}">Rareza</span>
                    <span class="badge text-bg-dark border border-secondary" style="font-size: 0.6rem;" th:text="${carta.tipo}">Tipo</span>
                </div>

                <small class="text-muted flex-grow-1 d-flex align-items-center justify-content-center carta-desc" th:text="${carta.descripcion}">Descripcion</small>

            </div>
        </div>
    </div>

</main>
</body>
</html>
