<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Coleccion - MythicStack</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/main.css}" />
  <style>
    /* Aseguramos que el fondo general sea oscuro para que resalte el arte */
    body { background-color: #121212; color: #f8f9fa; }

    /* Estilos estructurales de la carta */
    .mythic-panel {
      border: 2px solid #444;
      padding: 15px;
      border-radius: 10px;
      background: #222;
      height: 100%;
      display: flex;
      flex-direction: column;
      transition: transform 0.2s;
    }
    .mythic-panel:hover {
      transform: translateY(-5px);
    }

    /* Lógica visual: Cartas que tenés vs las que te faltan */
    .carta-activa {
      border-color: #d4af37; /* Borde dorado */
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
    }
    .carta-apagada {
      opacity: 0.35;
      filter: grayscale(100%);
    }

    /* Estilos para las imágenes */
    .carta-img {
      height: 220px;
      width: 100%;
      object-fit: cover; /* Evita que la imagen se deforme */
      border-radius: 6px;
      border: 1px solid #000;
    }
    .placeholder-arte {
      height: 220px;
      background-color: #1a1a1a;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px dashed #555;
      color: #666;
    }
  </style>
</head>
<body>
<main class="container py-5">
  <h2 class="text-center mb-5 fw-bold" style="color: var(--game-epic, #d4af37);">Tu Colección</h2>

  <div class="row">
    <!-- Iteramos sobre todas las cartas del juego -->
    <div th:each="carta : ${todasLasCartas}" class="col-md-3 mb-4">

      <!-- Se aplica 'carta-activa' o 'carta-apagada' según el inventario -->
      <div th:classappend="${misCantidades.containsKey(carta.id)} ? 'carta-activa' : 'carta-apagada'"
           class="mythic-panel text-center position-relative">

  <span th:if="${misCantidades.containsKey(carta.id)}"
        class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger fs-6"
        style="z-index: 10; box-shadow: 0 0 5px #000;">
      x<span th:text="${misCantidades.get(carta.id)}">1</span>
  </span>

        <div class="mb-3">
        <!-- ZONA DE ARTE -->
            <div class="mb-3 text-center">
                <img th:if="${carta.imagen != null and not #strings.isEmpty(carta.imagen)}"
                     th:src="@{'/img/cartas/' + ${carta.imagen}}"
                     th:alt="${carta.nombre}"
                     class="carta-img shadow"
                     style="width: 100%; height: auto; max-width: 150px;">

                <div th:unless="${carta.imagen != null and not #strings.isEmpty(carta.imagen)}"
                     class="placeholder-arte shadow d-flex align-items-center justify-content-center"
                     style="width: 100%; height: 150px; background-color: #222; color: #777;">
                    <small>Arte no disponible</small>
                </div>
            </div>

        <!-- ZONA DE DATOS -->
        <h5 class="text-uppercase fw-bold mb-2" th:text="${carta.nombre}">Nombre</h5>

        <div class="mb-2">
          <span class="badge text-bg-warning" th:text="${carta.rareza}">Rareza</span>
          <span class="badge text-bg-dark border border-secondary" th:text="${carta.tipo}">Tipo</span>
        </div>

        <!-- flex-grow-1 empuja este texto para ocupar el espacio restante y alinear las cartas -->
        <small class="text-muted flex-grow-1" th:text="${carta.descripcion}">Descripcion</small>

      </div>
    </div>
  </div>
  </div>

  <div class="text-center mt-5">
    <!-- Actualizado con th:href para respetar el enrutamiento de Spring -->
    <a th:href="@{/lobby}" class="btn btn-outline-light btn-lg px-5">Volver al Lobby</a>
  </div>
</main>
</body>
</html>
