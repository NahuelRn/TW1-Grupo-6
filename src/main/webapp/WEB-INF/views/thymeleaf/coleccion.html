<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Coleccion - MythicStack</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/main.css}" />
</head>
<body>
<main class="container py-5">
  <h2 class="text-center mb-5" style="color: var(--game-epic);">Tu Coleccion</h2>

  <div class="row">
    <div th:each="carta : ${todasLasCartas}" class="col-md-3 mb-4">
      <div th:classappend="${cartasQueTengo.contains(carta.id)} ? 'carta-activa' : 'carta-apagada'"
           class="mythic-panel text-center">
        <h5 th:text="${carta.nombre}">Nombre</h5>
        <p th:text="${carta.rareza}">Rareza</p>
        <small th:text="${carta.descripcion}">Descripcion</small>
      </div>
    </div>
  </div>

  <div class="text-center mt-4">
    <a href="lobby" class="btn btn-mythic-epic">Volver al Lobby</a>
  </div>
</main>
</body>
</html>
