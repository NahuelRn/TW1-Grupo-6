<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MythicStack - Armado de Mazo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* ── FONDO ── */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff;
            min-height: 100vh;
            background-color: #0c0c0e;
            background-image:
                    radial-gradient(ellipse at 20% 0%, rgba(139,0,0,0.18) 0%, transparent 55%),
                    radial-gradient(ellipse at 80% 100%, rgba(139,0,0,0.12) 0%, transparent 55%),
                    radial-gradient(ellipse at 50% 50%, rgba(229,169,59,0.04) 0%, transparent 70%);
            background-attachment: fixed;
        }

        /* ── PARTÍCULAS decorativas (pseudo-elementos) ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                    radial-gradient(1px 1px at 15% 25%, rgba(229,169,59,0.25) 0%, transparent 100%),
                    radial-gradient(1px 1px at 42% 68%, rgba(229,169,59,0.2)  0%, transparent 100%),
                    radial-gradient(1px 1px at 73% 18%, rgba(229,169,59,0.15) 0%, transparent 100%),
                    radial-gradient(1px 1px at 88% 55%, rgba(229,169,59,0.2)  0%, transparent 100%),
                    radial-gradient(1px 1px at 60% 85%, rgba(229,169,59,0.15) 0%, transparent 100%);
            pointer-events: none;
            z-index: 0;
        }

        .container { position: relative; z-index: 1; }

        /* ── BOTÓN VOLVER ── */
        .btn-volver {
            font-family: 'Cinzel', serif;
            color: #d4af37;
            border: 1px solid #d4af37;
            background-color: transparent;
            padding: 8px 20px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-volver:hover {
            background-color: rgba(212,175,55,0.15);
            box-shadow: 0 0 10px rgba(212,175,55,0.3);
            color: #d4af37;
        }

        /* ── TÍTULOS ── */
        .titulo-seccion {
            font-family: 'Cinzel', serif;
            color: #e63946;
            font-weight: 900;
            letter-spacing: 3px;
            text-shadow: 0 0 20px rgba(230,57,70,0.5), 0 0 40px rgba(230,57,70,0.2);
        }
        .subtitulo {
            color: #a09090;
            font-size: 1rem;
            letter-spacing: 1px;
        }

        /* ── CARDS ── */
        .mythic-card {
            background: linear-gradient(160deg, #1a1111 0%, #131316 100%) !important;
            border: 2px solid #e5a93b !important;
            border-radius: 12px !important;
            position: relative;
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }
        .mythic-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 0 25px rgba(229,169,59,0.4);
        }
        .mythic-card.seleccionada {
            border-color: #e63946 !important;
            box-shadow: 0 0 25px rgba(230,57,70,0.6) !important;
            background: linear-gradient(160deg, #1f0f0f 0%, #1a0f0f 100%) !important;
        }
        .quantity-badge {
            position: absolute; top: -12px; right: -12px;
            background-color: #ff4d6d !important;
            color: white !important;
            font-weight: bold; font-size: 0.75rem;
            padding: 4px 8px; border-radius: 50%;
            border: 2px solid #e5a93b;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            z-index: 10;
        }
        .card-img-container {
            width: 100%; aspect-ratio: 7 / 10;
            background-color: #09090b;
            border-radius: 8px; overflow: hidden;
            border: 1px solid #27272a;
        }
        .card-img-container img { width: 100%; height: 100%; object-fit: cover; }
        .no-art {
            color: #52525b; font-size: 0.8rem; font-weight: 500;
            text-transform: uppercase; letter-spacing: 1px;
            border: 2px dashed #27272a;
            width: 90%; height: 90%;
            display: flex; align-items: center; justify-content: center;
            border-radius: 6px;
        }
        .card-title-mythic {
            font-family: 'Cinzel', serif;
            font-size: 0.8rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.5px;
            margin-top: 8px; color: #ffffff;
        }
        .badge-rarity {
            background-color: transparent !important;
            border: 1px solid #e5a93b !important;
            color: #e5a93b !important;
            font-size: 0.65rem; font-weight: 700; padding: 3px 6px;
        }
        .badge-type {
            background-color: #27272a !important;
            color: #ffffff !important;
            font-size: 0.65rem; font-weight: 700; padding: 3px 6px;
        }
        .card-desc-mythic {
            color: #a1a1aa !important;
            font-size: 0.75rem; margin-top: 8px; min-height: 35px;
        }
        .mythic-checkbox {
            width: 20px; height: 20px;
            accent-color: #e63946; cursor: pointer;
        }

        /* ── CONTADOR ── */
        .contador-box {
            background: linear-gradient(135deg, #1a1111, #131316);
            border: 2px solid #e5a93b;
            border-radius: 10px;
            padding: 10px 24px;
            display: inline-block;
            font-family: 'Cinzel', serif;
            font-size: 1rem; font-weight: 700;
            color: #e5a93b; letter-spacing: 1px;
            box-shadow: 0 0 10px rgba(229,169,59,0.15);
        }
        .contador-box.listo {
            border-color: #e63946; color: #e63946;
            box-shadow: 0 0 15px rgba(230,57,70,0.4);
        }

        /* ── BOTÓN RANDOM ── */
        .btn-random {
            background-color: transparent;
            border: 2px solid #e5a93b;
            color: #e5a93b;
            font-family: 'Cinzel', serif;
            font-weight: 700; letter-spacing: 1px;
            padding: 10px 22px; border-radius: 8px;
            transition: all 0.2s ease; font-size: 0.85rem;
        }
        .btn-random:hover {
            background-color: rgba(229,169,59,0.15);
            color: #e5a93b;
            box-shadow: 0 0 14px rgba(229,169,59,0.35);
        }
        .btn-random:active { transform: scale(0.97); }

        /* ── BOTÓN GUARDAR ── */
        .btn-guardar-mazo {
            font-family: 'Cinzel', serif;
            font-weight: 700; letter-spacing: 2px;
            padding: 14px 50px; font-size: 1rem;
            background: linear-gradient(135deg, #8b0000, #e63946);
            border: none; border-radius: 8px;
            box-shadow: 0 0 20px rgba(230,57,70,0.4);
            transition: all 0.3s ease;
        }
        .btn-guardar-mazo:hover:not(:disabled) {
            box-shadow: 0 0 30px rgba(230,57,70,0.6);
            transform: translateY(-2px);
        }
        .btn-guardar-mazo:disabled {
            opacity: 0.4; cursor: not-allowed;
        }
        .instruccion { color: #a09090; font-size: 0.9rem; margin-top: 8px; }

        /* ── DIVISOR ── */
        .divisor-mythic {
            border: none;
            border-top: 1px solid rgba(74, 18, 18, 0.5);
            margin: 30px 0;
        }
    </style>
</head>
<body>

<div class="container my-5">

    <!-- BOTÓN VOLVER AL LOBBY (arriba a la izquierda) -->
    <div class="mb-4">
        <a th:href="@{/lobby}" class="btn-volver">
            &#8592; Volver al Lobby
        </a>
    </div>

    <!-- ENCABEZADO -->
    <div class="text-center mb-4">
        <h1 class="titulo-seccion mb-2">ARMADO DE MAZO</h1>
        <p class="subtitulo">
            Selecciona exactamente <strong style="color:#e5a93b;">15 cartas</strong> para formar tu mazo
        </p>
        <hr class="divisor-mythic" style="max-width:400px; margin:20px auto;">
        <div class="d-flex align-items-center justify-content-center gap-3 flex-wrap">
            <span class="contador-box" id="contador-mazo">0 / 15 cartas seleccionadas</span>
            <button type="button" class="btn-ran
            dom" id="btn-random" onclick="seleccionarRandom()">
                &#127922; SELECCIONAR 15 AL AZAR
            </button>
        </div>
    </div>

    <div th:if="${error}" class="alert alert-danger text-center shadow" th:text="${error}"></div>

    <!-- FORMULARIO -->
    <form th:action="@{/mazo/guardar}" method="POST">
        <div id="contenedor-cartas"
             class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-5 g-4 px-3">

            <div class="col card-item-node"
                 th:each="item : ${inventario}"
                 th:attr="data-rareza=${item.carta.rareza}">
                <div class="card h-100 mythic-card p-3">

                    <span class="quantity-badge" th:text="'x' + ${item.cantidad}">x1</span>

                    <div class="card-img-container">
                        <img th:if="${item.carta.imagen != null and not #strings.isEmpty(item.carta.imagen)}"
                             th:src="@{/img/{img}(img=${item.carta.imagen})}"
                             th:alt="${item.carta.nombre}">
                        <div th:unless="${item.carta.imagen != null and not #strings.isEmpty(item.carta.imagen)}"
                             class="no-art d-flex align-items-center justify-content-center w-100 h-100">
                            <span>Sin imagen</span>
                        </div>
                    </div>

                    <div class="text-center mt-2">
                        <h5 class="card-title-mythic" th:text="${item.carta.nombre}">NOMBRE</h5>
                        <div class="d-flex justify-content-center gap-1 my-2">
                            <span class="badge badge-rarity"
                                  th:text="${item.carta.rareza != null} ? ${item.carta.rareza} : 'COMÚN'">COMÚN</span>
                            <span class="badge badge-type"
                                  th:text="${item.carta.tipo != null} ? ${item.carta.tipo} : 'TIPO'">ATAQUE</span>
                        </div>
                        <p class="card-desc-mythic"
                           th:text="${item.carta.descripcion != null} ? ${item.carta.descripcion} : 'Sin descripción.'">
                            Efecto
                        </p>
                        <div class="form-check d-flex justify-content-center mt-2">
                            <input class="form-check-input mythic-checkbox checkbox-mazo"
                                   type="checkbox" name="cartasIds" th:value="${item.carta.id}">
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <!-- BOTÓN GUARDAR -->
        <div class="text-center mt-5 mb-3">
            <button type="submit" id="btn-guardar" class="btn text-white btn-guardar-mazo" disabled>
                GUARDAR MAZO
            </button>
            <p class="instruccion" id="msg-mazo">
                Selecciona exactamente 15 cartas para habilitar el botón
            </p>
        </div>
    </form>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const MAX_CARTAS = 15;

        window.actualizarContador = function () {
            const seleccionadas = document.querySelectorAll(".checkbox-mazo:checked").length;
            const contador   = document.getElementById("contador-mazo");
            const btnGuardar = document.getElementById("btn-guardar");
            const msgMazo    = document.getElementById("msg-mazo");

            contador.textContent = seleccionadas + " / " + MAX_CARTAS + " cartas seleccionadas";

            if (seleccionadas === MAX_CARTAS) {
                contador.classList.add("listo");
                btnGuardar.disabled = false;
                msgMazo.textContent = "Mazo completo! Ya podes guardarlo";
                msgMazo.style.color = "#e63946";
            } else {
                contador.classList.remove("listo");
                btnGuardar.disabled = true;
                msgMazo.textContent = "Selecciona exactamente 15 cartas para habilitar el boton";
                msgMazo.style.color = "#a09090";
            }
        };

        // Click en la card completa
        document.querySelectorAll(".mythic-card").forEach(function (card) {
            card.addEventListener("click", function () {
                const checkbox = card.querySelector(".checkbox-mazo");
                const seleccionadas = document.querySelectorAll(".checkbox-mazo:checked").length;
                if (!checkbox.checked && seleccionadas >= MAX_CARTAS) return;
                checkbox.checked = !checkbox.checked;
                card.classList.toggle("seleccionada", checkbox.checked);
                actualizarContador();
            });
        });

        document.querySelectorAll(".checkbox-mazo").forEach(function (cb) {
            cb.addEventListener("change", actualizarContador);
        });

        // Ordenar por rareza al cargar
        const contenedor  = document.getElementById("contenedor-cartas");
        const nodos       = Array.from(contenedor.querySelectorAll(".card-item-node"));
        const pesosRareza = { "Comun": 1, "Poco Comun": 2, "Rara": 3, "Exotica": 4, "Legendaria": 5 };

        nodos.sort(function (a, b) {
            const pesoA = pesosRareza[a.getAttribute("data-rareza")] || 99;
            const pesoB = pesosRareza[b.getAttribute("data-rareza")] || 99;
            return pesoA - pesoB;
        });
        nodos.forEach(function (nodo) { contenedor.appendChild(nodo); });

        actualizarContador();
    });

    function seleccionarRandom() {
        var MAX_CARTAS = 15;

        // 1. Deseleccionar todo
        document.querySelectorAll(".checkbox-mazo").forEach(function (cb) {
            cb.checked = false;
            var card = cb.closest(".mythic-card");
            if (card) card.classList.remove("seleccionada");
        });

        // 2. Obtener todos los checkboxes
        var todos = Array.from(document.querySelectorAll(".checkbox-mazo"));

        if (todos.length < MAX_CARTAS) {
            alert("No tenes suficientes cartas en el inventario para armar un mazo de 15.");
            return;
        }

        // 3. Fisher-Yates shuffle
        for (var i = todos.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var temp = todos[i];
            todos[i] = todos[j];
            todos[j] = temp;
        }

        // 4. Marcar los primeros 15
        for (var k = 0; k < MAX_CARTAS; k++) {
            todos[k].checked = true;
            var card = todos[k].closest(".mythic-card");
            if (card) card.classList.add("seleccionada");
        }

        // 5. Actualizar contador
        actualizarContador();
    }
</script>
</body>
</html>
