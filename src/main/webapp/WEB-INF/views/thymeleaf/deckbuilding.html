<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/globals.css}"> <!-- Tu archivo con variables -->
    <title>MythicStack - Armar Mazo</title>
</head>
<body style="background-color: var(--game-void); color: var(--game-text);">
<div class="container mt-5">
    <h1 style="font-family: 'Cinzel', serif;">Armar mi Mazo</h1>
    <p class="text-muted">Selecciona exactamente 15 cartas sin repetir</p>

    <!-- Mensaje de Error -->
    <div th:if="${error}" class="alert alert-danger" role="alert"
         style="background-color: var(--game-blood); color: white; border-radius: var(--border-radius-general);">
        <span th:text="${error}"></span>
    </div>

    <form th:action="@{/mazo/guardar}" method="POST" class="mt-4">
        <div class="row">
            <!-- itera las cartas del inventario del usuario -->
            <div th:each="carta : ${inventario}" class="col-md-3 mb-3">
                <div class="card" style="background-color: var(--game-panel); border: 1px solid var(--game-border); box-shadow: var(--shadow-game);">
                    <div class="card-body text-center">
                        <h5 class="card-title" th:text="${carta.nombre}"></h5>
                        <input type="checkbox" name="cartasIds" th:value="${carta.id}"> Seleccionar
                    </div>
                </div>
            </div>
        </div>

        <div class="text-center mt-4">
            <!-- Botón Épico -->
            <button type="submit" class="btn"
                    style="background-color: var(--game-epic); color: var(--game-void); font-weight: bold; border-radius: var(--border-radius-general);">
                GUARDAR MAZO
            </button>
        </div>
    </form>
</div>
</body>
</html>
