<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Game Over</title>

    <style>
        body {
            background-color: #0c0c0e;
            font-family: 'Courier New', Courier, monospace;
            color: #ffffff;
            text-align: center;
            padding: 60px;
        }

        .box {
            background-color: #1a1a1f;
            border: 2px solid #e63946;
            border-radius: 10px;
            max-width: 500px;
            margin: auto;
            padding: 40px;
            box-shadow: 0 0 20px rgba(230, 57, 70, 0.3);
        }

        .title {
            color: #e63946;
            font-size: 30px;
            margin-bottom: 20px;
        }

        .log {
            color: #a1a1aa;
            margin: 20px 0;
        }

        .btn {
            margin-top: 25px;
            padding: 12px 20px;
            background: #27272a;
            border: 1px solid #e63946;
            color: #e63946;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn:hover {
            background: #e63946;
            color: #000;
        }
    </style>
</head>

<body>
<div class="box">
    <div class="title">>>> HAS MUERTO <<<</div>

    <div class="log" th:text="${logCombate}">El infectado te derrotó...</div>

    <a href="/lobby"><button class="btn">VOLVER AL LOBBY</button></a>
</div>
</body>
</html>
