<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MythicStack - Derrota</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff;
            background-image: radial-gradient(circle at 15% 20%, rgba(229, 169, 59, 0.07) 0%, transparent 45%), radial-gradient(circle at 85% 80%, rgba(230, 57, 70, 0.06) 0%, transparent 50%), linear-gradient(rgba(229, 169, 59, 0.015) 1px, transparent 1px), linear-gradient(90deg, rgba(229, 169, 59, 0.015) 1px, transparent 1px), radial-gradient(circle at center, transparent 40%, #040405 110%);
            background-size: 100% 100%, 100% 100%, 45px 45px, 45px 45px, 100% 100%;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .game-over-container {
            background-color: #131316 !important;
            border: 2px solid #ff0013 !important;
            border-radius: 10px !important;
            box-shadow: 0 0 100px rgb(255 0 19);
            width: 100%;
            max-width: 500px;
            padding: 30px;
        }

        .titulo-derrota {
            color: #e63946;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(230, 57, 70, 0.6);
            margin-bottom: 20px;
            font-size: 50px;
        }

        .stats-box {
            background-color: #09090b !important;
            border: 2px solid #74848552;
            padding: 15px;
            border-radius: 8px;
            text-align: left;
            margin: 30px 0;
            box-shadow: 0px 7px 10px 0px #0000007a;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-row {
            display: flex;
            margin-bottom: 5px;
            align-items: baseline;
            padding: 5px 0px 5px 0px;
        }

        .carta-marco {
            width: 150px;
            aspect-ratio: 7 / 10;
            background-color: #2A2A30;
            border: 1px solid #e5a93b;
            border-radius: 7px;
            overflow: hidden;
            margin: 0 auto 25px auto;
            box-shadow: 0px 10px 15px 0px black;
            zoom: 1.1;
        }

        .carta-marco img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .btn-lobby {
            background-color: #e63946;
            color: white;
            border: none;
            text-transform: uppercase;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 5px;
            transition: 0.3s;
        }

        .btn-lobby:hover {
            background-color: #b91c29;
        }

        .text-white-50 {
            --bs-text-opacity: 1;
            color: rgba(255, 255, 255, .5) !important;
            font-size: 20px;
            text-shadow: 0px 5px 3px black;
        }

        .text-white.mb-3 {
            text-align: center;
            text-shadow: 0.3px 0px 0px white, 0px 2px 0px black;
            font-size: 17px !important;
        }
    </style>
</head>

<body th:style="|background-image: url('@{/img/Game_over.png}'); background-size: cover; background-position: center; background-attachment: fixed;|">


<div class="game-over-container text-center">
    <h1 class="titulo-derrota">Derrota</h1>

    <h4 class="text-warning mb-4" th:text="${motivoDerrota}">¡Motivo de la derrota!</h4>

    <div class="carta-marco" th:if="${ultimaCartaJugada != null}">
        <img th:src="@{/img/{img}(img=${ultimaCartaJugada.imagen})}" alt="Última carta">
    </div>
    <p class="text-white-50 small mb-4">Tu última jugada: <span th:text="${ultimaCartaJugada.nombre}">Carta</span></p>

    <div class="stats-box">
        <div class="stat-row">
            <span class="text-white-50">Último intercambio:</span>
        </div>
        <div class="text-white mb-3" style="font-size: 0.9rem;" th:text="${logCombate}">Detalle...</div>

        <div class="stat-row">
            <span class="text-white-50">Vida restante enemigo:</span>
            <span class="text-danger fw-bold" th:text="${partida.hpEnemigo} + ' HP'">0 HP</span>
        </div>
        <div class="stat-row">
            <span class="text-white-50">Tu vida restante:</span>
            <span class="text-white fw-bold" th:text="${partida.hpJugador} + ' HP'">0 HP</span>
        </div>
    </div>

    <a th:href="@{/lobby}" class="btn btn-lobby w-100">Volver al Lobby</a>
</div>

</body>
</html>
