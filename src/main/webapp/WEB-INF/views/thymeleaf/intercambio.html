<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mercado - MythicStack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/main.css}" />
    <style>
        body {
            background-color: var(--game-void, #120c0c);
            color: var(--game-text, #f0ead6);
            font-family: 'Roboto', sans-serif;
        }
        .titulo-mercado {
            font-family: 'Cinzel', serif;
            color: var(--game-epic, #8b0000);
            text-shadow: var(--shadow-game, 0 0 10px rgba(139, 0, 0, 0.5));
            margin-bottom: 20px;
        }
        .card-trade {
            background-color: var(--game-panel, #1a1111);
            border: 1px solid var(--game-border, #4a1212);
            border-radius: 6px;
            box-shadow: var(--shadow-game, 0 4px 15px rgba(0,0,0,0.5));
            transition: transform 0.3s;
        }
        .card-trade:hover {
            transform: scale(1.02);
        }
        .btn-trade {
            background-color: var(--game-epic, #8b0000);
            color: #ffffff;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            border-radius: 6px;
            border: none;
        }
        .btn-trade:hover {
            background-color: #b30000;
        }
        /* Estilo medieval personalizado para el botón de Volver */
        .btn-mythic-back {
            font-family: 'Cinzel', serif;
            color: #d4af37 !important;
            border: 1px solid #d4af37 !important;
            background-color: transparent;
            padding: 10px 25px;
            transition: all 0.3s ease;
            text-decoration: none;
            border-radius: 6px;
            display: inline-block;
        }
        .btn-mythic-back:hover {
            background-color: rgba(212, 175, 55, 0.15) !important;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }
    </style>
</head>
<body>
<div class="container d-flex flex-column align-items-center justify-content-center py-5" style="min-height: 90vh;">

    <h1 class="titulo-mercado display-4">Mercado de Intercambio</h1>
    <p class="mb-5" style="color: var(--game-muted, #a09090); font-size: 1.1rem;">Cambia tus cartas repetidas con la comunidad.</p>

    <div class="row w-100 justify-content-center">
        <div th:each="oferta : ${ofertas}" class="col-md-4 mb-4">
            <div class="card card-trade p-4 text-center">
                <h3 class="titulo-mercado" style="font-size: 1.5rem;" th:text="${oferta.cartaOfrecida.nombre}">Carta</h3>
                <div class="mb-3">
                    <span class="badge" style="background-color: #4a1212; color: #d4af37;" th:text="${oferta.cartaOfrecida.rareza}">RAREZA</span>
                </div>
                <p class="small text-muted">Ofrecido por: <span th:text="${oferta.usuarioEmisor.email}">Usuario</span></p>
                <hr style="border-color: var(--game-border, #4a1212);">
                <p>Busca a cambio: <strong th:text="${oferta.rarezaBuscada}">Cualquier Rareza</strong></p>

                <form th:action="@{/mercado/aceptar}" method="POST">
                    <input type="hidden" name="idOferta" th:value="${oferta.id}">
                    <button type="submit" class="btn btn-trade w-100 py-2">ACEPTAR TRADE</button>
                </form>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(ofertas)}" class="col-12 text-center my-4">
            <div class="p-4 rounded" style="background-color: rgba(26, 17, 17, 0.6); border: 1px dashed var(--game-border, #4a1212); max-width: 600px; margin: 0 auto;">
                <p class="lead mb-0" style="color: var(--game-muted, #a09090); font-style: italic;">
                    No hay propuestas de intercambio disponibles en este momento.
                </p>
            </div>
        </div>
    </div>

    <div class="mt-5">
        <a th:href="@{/lobby}" class="btn btn-mythic-back">
            Volver al Lobby
        </a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
        crossorigin="anonymous"></script>
</body>
</html>
