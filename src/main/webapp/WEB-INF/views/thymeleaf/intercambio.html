<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mercado - MythicStack</title>
    <!-- Bootstrap y Estilos Globales -->
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/globals.css}">
    <style>
        body {
            background-color: var(--game-void); /* [7] */
            color: var(--game-text); /* [7] */
            font-family: 'Roboto', sans-serif; /* [8] */
        }
        .titulo-mercado {
            font-family: 'Cinzel', serif; /* [8] */
            color: var(--game-epic); /* [8] */
            text-shadow: var(--shadow-game); /* [10] */
            margin-bottom: 40px;
        }
        .card-trade {
            background-color: var(--game-panel); /* [7] */
            border: 1px solid var(--game-border); /* [7] */
            border-radius: 6px; /* [9] */
            box-shadow: var(--shadow-game); /* [10] */
            transition: transform 0.3s;
        }
        .card-trade:hover {
            transform: scale(1.02);
        }
        .btn-trade {
            background-color: var(--game-epic); /* [10] */
            color: var(--game-void); /* [10] */
            font-family: 'Cinzel', serif; /* [8] */
            font-weight: bold;
            border-radius: 6px; /* [9] */
            border: none;
        }
        .btn-trade:hover {
            background-color: var(--game-epic-hover); /* [8] */
        }
    </style>
</head>
<body>
<div class="container text-center py-5">
    <h1 class="titulo-mercado">Mercado de Intercambio</h1>
    <p class="text-muted mb-5">Tradea tus cartas repetidas con la comunidad.</p>

    <!-- Listado de Ofertas -->
    <div class="row">
        <div th:each="oferta : ${ofertas}" class="col-md-4 mb-4">
            <div class="card card-trade p-4">
                <h3 class="titulo-mercado" style="font-size: 1.5rem;" th:text="${oferta.cartaOfrecida.nombre}">Carta</h3>
                <div class="mb-3">
                    <span class="badge" style="background-color: var(--game-magic);" th:text="${oferta.cartaOfrecida.rareza}">RAREZA</span>
                </div>
                <p class="small text-muted">Ofrecido por: <span th:text="${oferta.usuarioEmisor.email}">Usuario</span></p>
                <hr style="border-color: var(--game-border);">
                <p>Busca a cambio: <strong th:text="${oferta.rarezaBuscada}">Cualquier Rareza</strong></p>

                <form th:action="@{/mercado/aceptar}" method="POST">
                    <input type="hidden" name="idOferta" th:value="${oferta.id}">
                    <button type="submit" class="btn btn-trade w-100">ACEPTAR TRADE</button>
                </form>
            </div>
        </div>

        <!-- Mensaje si no hay ofertas -->
        <div th:if="${#lists.isEmpty(ofertas)}" class="col-12">
            <p class="lead" style="color: var(--game-muted);">No hay propuestas de intercambio disponibles en este momento.</p>
        </div>
    </div>

    <div class="mt-5">
        <a th:href="@{/lobby}" class="btn" style="border: 1px solid var(--game-muted); color: var(--game-muted);">
            Volver al Lobby
        </a>
    </div>
</div>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
