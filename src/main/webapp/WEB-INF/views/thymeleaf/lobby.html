<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Lobby - MythicStack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/main.css}" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;800&display=swap');

        .mythic-panel {
            background-color: rgba(42, 42, 48, 0.45);
            backdrop-filter: blur(6px);
        }

        .titulo-lobby {
            font-family: 'Cinzel', serif;
            font-weight: 800;
            letter-spacing: 4px;
            color: var(--game-epic);
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }

        .btn-lobby {
            font-family: 'Cinzel', serif;
            letter-spacing: 1px;
            background-color: transparent;
            color: #d4af37 !important;
            border: 1px solid #d4af37 !important;
            transition: 0.3s;
        }
        .btn-lobby:hover,
        .btn-lobby:focus,
        .btn-lobby:active,
        .show > .btn-lobby.dropdown-toggle {
            background-color: rgba(212, 175, 55, 0.15) !important;
            color: #d4af37 !important;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }
        /* BOTÓN PRINCIPAL ROJO SANGRE */
        .btn-comenzar {
            font-family: 'Cinzel', serif;
            font-weight: 800;
            letter-spacing: 2px;
            background-color: #8a0303; /* Rojo sangre oscuro */
            color: white !important;
            border: 1px solid #ff4d4d !important;
            box-shadow: 0 0 15px rgba(138, 3, 3, 0.5); /* Resplandor rojo */
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .btn-comenzar:hover {
            transform: scale(1.05); /* Se agranda apenitas */
            background-color: #b30000; /* Rojo más vivo al pasar el mouse */
            box-shadow: 0 0 25px rgba(255, 77, 77, 0.6); /* Estalla el resplandor */
            color: white !important;
            border-color: white !important; /* Borde blanco para máximo contraste */
        }

    </style>
</head>
<body th:style="|background-image: url('@{/img/LobbyFondo.jpg}'); background-size: cover; background-position: center; background-attachment: fixed;|">
<main role="main" class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="col-md-8 col-sm-10 mythic-panel text-center">

        <h1 class="mb-3 titulo-lobby">MythicStack</h1>
        <h4 class="mb-5" style="color: var(--game-muted); font-size: 1.05rem; line-height: 1.7;">
            Bienvenido,
            <span style="color: var(--game-epic); font-weight: 700;"
                  th:text="${session.USUARIO != null and !#strings.isEmpty(session.USUARIO.nombre)} ? ${session.USUARIO.nombre} : 'Aventurero'">
        Aventurero
    </span>...
            Tenés
            <span style="color: #e5a93b; font-weight: 700;" th:text="${session.USUARIO != null ? session.USUARIO.oro : 0}">0</span>
            de Oro bajo tu nombre, sos Nivel
            <span style="color: #0dcaf0; font-weight: 700;" th:text="${session.USUARIO != null ? session.USUARIO.nivel : 1}">1</span>
            con
            <span style="color: #0dcaf0; font-weight: 700;" th:text="${session.USUARIO != null ? session.USUARIO.experiencia : 0}">0</span>
            de Experiencia en Combate. ¿Qué vas a hacer ahora?
        </h4>

        <div class="d-grid gap-3 col-6 mx-auto mt-4">

            <a th:href="@{/deckbuilding}" class="btn btn-lg btn-comenzar mb-2">Comenzar Aventura</a>

            <a th:href="@{/coleccion}" class="btn btn-lg btn-lobby">Ver Inventario</a>

            <a th:href="@{/historialPartida}" class="btn btn-lg btn-lobby">
                Historial de Aventuras
            </a>

            <a th:href="@{/tienda}" class="btn btn-lg btn-lobby">
                Ir a la Tienda del Gremio
            </a>

            <div class="dropdown">
                <button class="btn btn-lg dropdown-toggle w-100 btn-lobby" type="button" id="dropdownIntercambio" data-bs-toggle="dropdown" aria-expanded="false">
                    Contratos e Intercambios
                </button>
                <ul class="dropdown-menu w-100 dropdown-menu-dark" aria-labelledby="dropdownIntercambio">
                    <li><a class="dropdown-item" th:href="@{/contrato-mejora}">Contrato de Mejora</a></li>
                    <li><a class="dropdown-item" th:href="@{/mercado}">Intercambio con Aventureros</a></li>
                </ul>
            </div>

        </div>

    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
        crossorigin="anonymous"></script>
</body>
</html>
