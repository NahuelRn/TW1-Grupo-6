<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Lobby - MythicStack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/main.css}" />
</head>
<body>
<main role="main" class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="col-md-8 col-sm-10 mythic-panel text-center">

        <h1 class="mb-3" style="color: var(--game-epic);">Bienvenido a MythicStack</h1>
        <h4 class="mb-5" style="color: var(--game-muted);">¿Que deseas hacer, guerrero?</h4>

        <div class="d-grid gap-3 col-6 mx-auto mt-4">

            <a th:href="@{/deckbuilding.html}" class="btn btn-danger btn-lg" style="background-color: #8b0000; border-color: #8b0000;">Comenzar</a>

            <a th:href="@{/coleccion.html}" class="btn btn-danger btn-lg" style="background-color: #8b0000; border-color: #8b0000;">Ver Inventario</a>

            <div class="dropdown">
                <button class="btn btn-outline-warning btn-lg dropdown-toggle w-100" type="button" id="dropdownIntercambio" data-bs-toggle="dropdown" aria-expanded="false" style="color: #d4af37; border-color: #d4af37;">
                    Intercambio de cartas
                </button>
                <ul class="dropdown-menu w-100 dropdown-menu-dark" aria-labelledby="dropdownIntercambio">
                    <li><a class="dropdown-item" th:href="@{/contrato-mejora}">Contrato de Mejora</a></li>
                    <li><a class="dropdown-item" th:href="@{/mercado}">Intercambio con Jugadores</a></li>
                </ul>
            </div>

        </div>

    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
        crossorigin="anonymous"></script>
</body>
</html>
