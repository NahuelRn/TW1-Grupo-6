<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detalle de Intercambio - MythicStack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}" />
    <style>
        body { background-color: #120c0c; color: #f0ead6; font-family: 'Courier New', Courier, monospace; }
        .titulo-mythic { font-family: 'Cinzel', serif; color: #8b0000; text-shadow: 0 0 10px rgba(139, 0, 0, 0.5); }
        .card-detalle { background-color: #1a1111; border: 1px solid #4a1212; border-radius: 8px; }
        .card-carta { background-color: #221515; border: 1px solid #d4af37; border-radius: 6px; padding: 15px; }
        .badge-rarity { background-color: transparent; border: 1px solid #d4af37; color: #d4af37; font-size: 0.8rem; }
        .user-highlight { color: #d4af37; font-weight: bold; }

        .carta-marco {
            width: 100%;
            aspect-ratio: 7 / 10;
            background-color: #2A2A30;
            border: 1px solid #404040;
            border-radius: 6px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .carta-marco img { width: 100%; height: 100%; object-fit: contain; }
        .carta-sin-arte {
            color: #A0A0A5;
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
            padding: 8px;
        }
        .grilla-cartas {
            display: grid;
            grid-template-columns: repeat(7, minmax(0, 1fr));
            gap: 1rem;
        }
        @media (max-width: 991.98px) { .grilla-cartas { grid-template-columns: repeat(5, minmax(0, 1fr)); } }
        @media (max-width: 767.98px) { .grilla-cartas { grid-template-columns: repeat(3, minmax(0, 1fr)); } }
        @media (max-width: 575.98px) { .grilla-cartas { grid-template-columns: repeat(2, minmax(0, 1fr)); } }

    </style>
</head>
<body>
<div class="container py-5">
    <div class="card card-detalle p-5 max-w-800 mx-auto">
        <h1 class="titulo-mythic text-center mb-4">Resumen de Intercambio</h1>

        <p class="text-center lead mb-5">
            Intercambio realizado con el usuario: <span class="user-highlight" th:text="${usuarioCoincidencia}">usuario@mail.com</span>
        </p>

        <div class="row g-4 justify-content-center">
            <!-- CARTA ENTREGADA -->
            <div class="col-md-5 text-center">
                <h3 class="h5 text-muted mb-3">CARTA QUE DISTE</h3>
                <div class="card-carta">
                    <div class="carta-marco carta-marco--grande mb-2">
                        <img th:src="@{/img/{img}(img=${cartaEntregada.imagen})}" alt="Carta Dada"/>
                    </div>
                    <h4 class="h6 mb-2" th:text="${cartaEntregada.nombre}">Nombre Carta</h4>
                    <span class="badge badge-rarity" th:text="${cartaEntregada.rareza}">RAREZA</span>
                </div>
            </div>

            <!-- ICONO DE TRANSFERENCIA -->
            <!--<div class="col-md-2 d-flex align-items-center justify-content-center">
                <span class="display-4 text-danger">⇄</span>
            </div>-->

            <!-- CARTA RECIBIDA -->
            <div class="col-md-5 text-center">
                <h3 class="h5 text-success mb-3">CARTA QUE RECIBISTE</h3>
                <div class="card-carta" style="border-color: #28a745;">
                    <img th:src="@{/img/{img}(img=${cartaRecibida.imagen})}" class="img-fluid mb-2" style="max-height: 160px; object-fit: contain;" alt="Carta Recibida"/>
                    <h4 class="h6 mb-2" th:text="${cartaRecibida.nombre}">Nombre Carta</h4>
                    <span class="badge badge-rarity" style="border-color: #28a745; color: #28a745;" th:text="${cartaRecibida.rareza}">RAREZA</span>
                </div>
            </div>
        </div>

        <div class="text-center mt-5">
            <a th:href="@{/mercado/mis-trades}" class="btn btn-outline-warning">Volver al Historial</a>
        </div>
    </div>
</div>
</body>
</html>
