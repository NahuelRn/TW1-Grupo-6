<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mis Trades</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        /* --- ESTILOS PERSONALIZADOS MYTHICSTACK --- */
        .mythic-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .mythic-modal-content {
            background-color: #121212;
            border: 2px solid #8b0000;
            padding: 30px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 0 20px rgba(139, 0, 0, 0.6);
            max-width: 420px;
            width: 90%;
        }

        .mythic-modal-content h3 {
            color: #ff3333;
            font-family: 'Arial Black', Gadget, sans-serif;
            margin-top: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .mythic-modal-content p {
            color: #ffffff;
            font-size: 16px;
            margin-bottom: 25px;
        }

        .mythic-modal-actions {
            display: flex;
            justify-content: space-evenly;
        }

        .mythic-btn-confirm {
            background-color: #8b0000;
            color: white;
            border: none;
            padding: 10px 24px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .mythic-btn-confirm:hover {
            background-color: #ff3333;
        }

        .mythic-btn-cancel {
            background-color: #2a2a2a;
            color: #cccccc;
            border: 1px solid #444444;
            padding: 10px 24px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }
        .mythic-btn-cancel:hover {
            background-color: #444444;
            color: white;
        }
    </style>
</head>
<body class="bg-dark text-light">
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="text-warning">Mis Publicaciones de Intercambio</h1>
        <div>
            <div>
                <a th:href="@{/mercado}" class="btn btn-outline-info me-2">Ofertas Comunidad</a>
                <a th:href="@{/mercado(tab='publicar')}" class="btn btn-warning">Nueva Solicitud</a>
            </div>
        </div>
    </div>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <table class="table table-dark table-striped align-middle border border-secondary">
        <thead>
        <tr>
            <th>Carta Buscada</th>
            <th>Rareza</th>
            <th>Estado</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="trade : ${misTrades}">
            <td th:text="${trade.cartaBuscada.nombre}">Nombre</td>
            <td><span class="badge bg-info" th:text="${trade.cartaBuscada.rareza}">RAREZA</span></td>
            <td>
                <span th:classappend="${trade.estado == 'ACTIVA'} ? 'badge bg-success' : 'badge bg-secondary'"
                      th:text="${trade.estado}">ESTADO</span>
            </td>
            <td>
                <form th:if="${trade.estado == 'ACTIVA'}" th:action="@{/mercado/eliminar}" method="POST" onsubmit="abrirConfirmacionMythic(event)">
                    <input type="hidden" name="idPropuesta" th:value="${trade.id}">
                    <button type="submit" class="btn btn-danger btn-sm">Eliminar</button>
                </form>
                <span th:if="${trade.estado != 'ACTIVA'}" class="text-muted small">Inmutable</span>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<div id="customConfirmModal" class="mythic-modal-overlay">
    <div class="mythic-modal-content">
        <h3>MythicStack</h3>
        <p>¿Estás seguro de que deseas eliminar esta petición?</p>
        <div class="mythic-modal-actions">
            <button type="button" onclick="confirmarEliminacionMythic()" class="mythic-btn-confirm">Eliminar</button>
            <button type="button" onclick="cerrarMythicModal()" class="mythic-btn-cancel">Cancelar</button>
        </div>
    </div>
</div>

<script>
    let formularioPorEnviar = null;

    function abrirConfirmacionMythic(event) {
        event.preventDefault();
        formularioPorEnviar = event.target;
        document.getElementById('customConfirmModal').style.display = 'flex';
    }

    function cerrarMythicModal() {
        document.getElementById('customConfirmModal').style.display = 'none';
        formularioPorEnviar = null;
    }

    function confirmarEliminacionMythic() {
        if (formularioPorEnviar) {
            formularioPorEnviar.submit();
        }
    }

    // Solución al Deprecated: Usamos window.addEventListener en lugar de window.onclick
    window.addEventListener('click', function(event) {
        const modal = document.getElementById('customConfirmModal');
        if (event.target === modal) {
            cerrarMythicModal();
        }
    });
</script>
</body>
</html>
