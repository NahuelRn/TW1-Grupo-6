<!DOCTYPE HTML>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>MythicStack - Registro</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">

  <link rel="stylesheet" th:href="@{/css/main.css}" />
</head>

<body th:style="|background-image: url('@{/img/LoginFondo.jpg}'); background-size: cover; background-position: center; background-attachment: fixed;|">

<main role="main" class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">

  <div class="col-md-6 col-sm-8 mythic-panel text-center">
    <form action="#" th:action="@{/registrarme}" method="POST" th:object="${usuario}">
      <h2 class="mb-4" style="color: var(--game-epic);">Registro de Guerrero</h2>
      <hr style="border-color: var(--game-border);">

      <div class="mb-3">
        <input th:field="*{email}" id="email" type="email" class="form-control mythic-input" placeholder="Correo electronico" required />
      </div>
      <div class="mb-4">
        <input th:field="*{password}" type="password" id="password" class="form-control mythic-input" placeholder="Contrasena" required />
      </div>

      <button id="btn-registrarme" class="btn btn-lg btn-mythic-blood w-100" type="submit">Confirmar Registro</button>

      <p th:if="${error != null}" class="alert alert-danger mt-3" style="background-color: var(--game-blood); color: white; border: none;" th:text="'Error: ' + ${error}"></p>
    </form>

    <div class="mt-3">
      <a href="login" class="btn w-100 btn-mythic-epic">Volver al Login</a>
    </div>
  </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
        crossorigin="anonymous"></script>
</body>

</html>
