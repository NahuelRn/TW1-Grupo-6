<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Publicar Solicitud de Trade</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/main.css}" />
</head>
<body class="bg-dark text-light">
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="text-warning">¿Qué carta deseas obtener?</h1>
        <a th:href="@{/mercado}" class="btn btn-outline-info">Volver al Mercado</a>
    </div>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="row">
        <div th:each="carta : ${cartasFaltantes}" class="col-md-3 mb-4">
            <div class="card bg-secondary text-white text-center p-3 h-100 border-light">
                <!-- CORREGIDO: Imagen vinculada mediante th:src a /img/ -->
                <div class="carta-marco mb-2">
                    <img th:if="${carta.imagen != null and not #strings.isEmpty(carta.imagen)}"
                         th:src="@{/img/{img}(img=${carta.imagen})}" alt="Carta">
                    <span th:unless="${carta.imagen != null and not #strings.isEmpty(carta.imagen)}"
                          class="carta-sin-arte">Arte no disponible</span>
                </div>

                <h5 th:text="${carta.nombre}">Nombre</h5>
                <span class="badge bg-info mb-3" th:text="${carta.rareza}">RAREZA</span>
                <p class="small" th:text="${carta.descripcion}"></p>
                <div class="mt-auto">
                    <form th:action="@{/mercado/publicar}" method="POST">
                        <input type="hidden" name="idCartaBuscada" th:value="${carta.id}">
                        <button type="submit" class="btn btn-warning w-100">SOLICITAR ESTA CARTA</button>
                    </form>
                </div>
            </div>
        </div>
        <div th:if="${#lists.isEmpty(cartasFaltantes)}" class="col-12 text-center text-muted py-5">
            <h3>¡Felicitaciones! Posees todas las cartas del juego en este momento.</h3>
        </div>
    </div>
</div>
</body>
</html>
