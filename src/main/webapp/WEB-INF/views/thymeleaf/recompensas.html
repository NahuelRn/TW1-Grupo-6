<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MythicStack - Victoria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Cinzel', serif;
            color: #ffffff;
            background-image: radial-gradient(circle at 15% 20%, rgba(59, 229, 169, 0.07) 0%, transparent 45%), radial-gradient(circle at 85% 80%, rgba(230, 200, 57, 0.06) 0%, transparent 50%), linear-gradient(rgba(229, 169, 59, 0.015) 1px, transparent 1px), linear-gradient(90deg, rgba(229, 169, 59, 0.015) 1px, transparent 1px), radial-gradient(circle at center, transparent 40%, #040405 110%);
            background-size: 100% 100%, 100% 100%, 45px 45px, 45px 45px, 100% 100%;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .victory-container {
            background: linear-gradient(180deg, #19191dd6 35%, #101013);
            border: 3px solid #008000;
            border-radius: 10px;
            width: 100%;
            max-width: 560px;
            padding: 40px;
            box-shadow: 0px 0px 50px 0px #00ff006e;
        }

        .titulo-victoria {
            font-size: 55px;
            font-weight: 900;
            letter-spacing: 5px;
            color: #00ff00;
            text-shadow: 0px 0px 50px #00ff00;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .divider {
            width: 330px;
            height: 3px;
            margin: 10px auto 30px;
            background: linear-gradient(to right, transparent, #00ff00, transparent);
        }

        .stats-box {
            background: linear-gradient(#0d0d11 50%, #00ff002b 140%);
            border: 2px solid #008000;
            border-radius: 10px;
            padding: 22px;
            margin: 35px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0px 10px 15px #00000085;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 22px;
        }

        .btn-reclamar {
            background: linear-gradient(green 40%, #00be00 100%);
            border: 2px solid yellow;
            font-size: 25px;
            transition: .25s;
            color: #ffffff;
            text-shadow: 0px 2px 0px black;
            text-transform: uppercase;
            box-shadow: 0px 8px 0px black;
            font-weight: 900;
        }

        .btn-reclamar:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px #00ff00, 0 0 35px rgba(183, 131, 44, .4);
            background: linear-gradient(#008000, #00ff00);
            color: white;
        }

        span.text-warning.fw-bold {
            padding: 0px 0px 0px 10px;
        }

        span.text-info.fw-bold {
            padding: 0px 0px 0px 10px;
        }
    </style>
</head>

<body th:style="|background-image: url('@{/img/Recompensa.png}'); background-size: cover; background-position: center; background-attachment: fixed;|">

<div class="victory-container text-center">
    <h1 class="titulo-victoria">¡Victoria!</h1>
    <div class="divider"></div>

    <h4 class="text-white-50 mb-4">Has conquistado el nivel</h4>

    <div class="stats-box">
        <div class="stat-row">
            <span class="text-white-50">Oro ganado:</span>
            <span class="text-warning fw-bold" th:text="'+' + ${recompensa.oro}">+0</span>
        </div>
        <div class="stat-row">
            <span class="text-white-50">Experiencia:</span>
            <span class="text-info fw-bold" th:text="'+' + ${recompensa.experiencia}">+0</span>
        </div>
    </div>

    <form th:action="@{/reclamar-recompensa}" method="post">
        <button type="submit" class="btn btn-reclamar w-100">Reclamar Botín</button>
    </form>
</div>

</body>
</html>
