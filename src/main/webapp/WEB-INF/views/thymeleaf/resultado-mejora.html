<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MythicStack - Contrato Ejecutado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}" />

    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
        }

        .mythic-panel {
            background-color: rgba(19, 19, 22, 0.82) !important;
            backdrop-filter: blur(6px);
        }

        .titulo-resultado {
            font-family: 'Cinzel', serif;
            font-weight: 900;
            color: var(--game-epic);
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
            letter-spacing: 2px;
        }

        .card-carta-obtenida {
            background-color: #131316;
            border: 2px solid var(--game-epic);
            border-radius: 12px;
            padding: 28px 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.8);
        }

        .nombre-carta {
            font-family: 'Cinzel', serif;
            color: var(--game-epic);
            font-size: 1.3rem;
            font-weight: 700;
            margin: 12px 0 8px;
        }

        .descripcion-carta {
            color: var(--game-muted);
            font-size: 0.9rem;
            line-height: 1.6;
            border-top: 1px solid var(--game-border);
            padding-top: 12px;
            margin-top: 10px;
        }

        .dato-carta {
            color: var(--game-text);
            font-size: 0.9rem;
        }
        .dato-carta strong {
            color: var(--game-epic);
        }
    </style>
</head>

<body th:style="|background-image: url('@{/img/ContratoFondo.jpg}'); background-size: cover; background-position: center; background-attachment: fixed;|">

<div class="container d-flex justify-content-center align-items-center py-5" style="min-height: 100vh;">
    <div class="col-md-6 col-sm-9 mythic-panel text-center">

        <h1 class="titulo-resultado mb-2">Contrato Ejecutado</h1>
        <p class="mb-4" style="color: var(--game-muted);">Los dioses de MythicStack han aceptado tu sacrificio.</p>

        <div th:if="${cartaPremio}">
            <p class="text-uppercase small mb-3" style="color: var(--game-muted); letter-spacing: 2px;">Carta Obtenida</p>

            <div class="card-carta-obtenida">
                <div class="carta-marco carta-marco--grande mb-3">
                    <img th:if="${cartaPremio.imagen != null and not #strings.isEmpty(cartaPremio.imagen)}"
                         th:src="@{/img/{img}(img=${cartaPremio.imagen})}" th:alt="${cartaPremio.nombre}">
                    <span th:unless="${cartaPremio.imagen != null and not #strings.isEmpty(cartaPremio.imagen)}"
                          class="carta-sin-arte">Arte no disponible</span>
                </div>

                <h2 class="nombre-carta" th:text="${cartaPremio.nombre}">Nombre Carta</h2>

                <div class="d-flex justify-content-center gap-2 flex-wrap mb-2">
                    <span class="badge" style="background-color: transparent; border: 1px solid var(--game-epic); color: var(--game-epic);"
                          th:text="${cartaPremio.rareza}">RAREZA</span>
                    <span class="badge" style="background-color: #27272a; color: var(--game-text);"
                          th:text="${cartaPremio.tipo != null and cartaPremio.subtipo != null}
                                   ? ${cartaPremio.tipo + ' · ' + cartaPremio.subtipo}
                                   : ${cartaPremio.tipo}">
                        TIPO
                    </span>
                </div>

                <p class="descripcion-carta" th:text="${cartaPremio.descripcion}">
                    Descripción de la carta obtenida.
                </p>

                <div class="mt-3">
                    <span class="dato-carta">
                        Valor: <strong th:text="${cartaPremio.valorOroBase + ' Oro'}">100 Oro</strong>
                    </span>
                </div>
            </div>
        </div>

        <div th:unless="${cartaPremio}" class="alert alert-danger mt-3">
            No se detectó ninguna carta obtenida. Volvé a intentar el proceso.
        </div>

        <div class="d-grid gap-2 col-10 mx-auto mt-4">
            <a th:href="@{/contrato-mejora(t=${#dates.createNow().getTime()})}" class="btn btn-lg btn-mythic-blood">
                Volver a Intentar
            </a>
            <a th:href="@{/lobby}" class="btn btn-lg btn-lobby">
                Volver al Lobby
            </a>
        </div>

    </div>
</div>

</body>
</html>
