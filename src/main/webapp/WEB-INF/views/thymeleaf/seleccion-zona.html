<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Selección de Zona - MythicStack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}" />
</head>
<body th:style="|background-image: url('@{/img/SeleccionZonaFondo.jpg}'); background-size: cover; background-position: center; background-attachment: fixed;|">
<div class="container text-center py-5">
    <h1 style="color: var(--game-epic);">Elige tu Destino</h1>
    <p class="lead mt-3">Tu mazo está listo. ¿Dónde quieres pelear?</p>

    <div class="row mt-5 justify-content-center">
        <div class="col-md-4">
            <div class="card bg-secondary mb-3">
                <div class="card-body">
                    <h5 class="card-title text-warning">Bosque Oscuro</h5>
                    <p class="card-text">Enemigos de nivel bajo. Ideal para probar tu mazo.</p>
                    <a th:href="@{/combate?zona=bosque}" class="btn btn-danger w-100">Adentrarse</a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card bg-secondary mb-3">
                <div class="card-body">
                    <h5 class="card-title text-danger">Caverna del Dragón</h5>
                    <p class="card-text">Peligro extremo. Solo para guerreros experimentados.</p>
                    <a th:href="@{/combate?zona=caverna}" class="btn btn-danger w-100">Adentrarse</a>
                </div>
            </div>
        </div>
    </div>

    <div class="mt-4">
        <a th:href="@{/mazo}" class="btn btn-outline-light">Volver a editar mazo</a>
    </div>
</div>
</body>
</html>
