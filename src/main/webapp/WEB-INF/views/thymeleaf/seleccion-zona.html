<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Seleccionar Zona</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background-color: #f4f4f9; }
        .btn-zona {
            padding: 15px 30px;
            background-color: #2c3e50;
            color: white;
            border: none;
            /* La métrica vital de UI: */
            border-radius: 6px;
            font-size: 18px;
            cursor: pointer;
            margin: 10px;
            transition: background 0.3s;
        }
        .btn-zona:hover { background-color: #34495e; }
    </style>
</head>
<body>
<h2>Elige tu destino de combate</h2>

<form th:action="@{/iniciar-combate}" method="POST">
    <button type="submit" name="zona" value="Bosque Oscuro" class="btn-zona">🌲 Bosque Oscuro</button>
    <button type="submit" name="zona" value="Cueva del Dragón" class="btn-zona">🐉 Cueva del Dragón</button>
</form>
</body>
</html>
