<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Selección de Zona - MythicStack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}" />

    <style>
        .zona-card {
            --hover-bg: none;
            background-color: rgba(20, 20, 24, 0.85);
            border: 2px solid #3f3f46;
            border-radius: 10px;
            transition: all 0.4s ease;
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: space-between;

            background-size: cover;
            background-position: center;
        }

        .zona-card:hover {
            transform: translateY(-8px);
            border-color: #8a0303;
            background-image: linear-gradient(rgba(15, 15, 18, 0.3), rgba(15, 15, 18, 0.4)), var(--hover-bg);
        }

        .zona-card a { color: white; text-decoration: none; }
        a.btn.btn-outline-warning {
            font-family: 'Montserrat', sans-serif;
            border: 2.7px solid #e5a93b;
            padding: 10px 20px;
            font-size: 20px;
            border-radius: 5px;
            background-color: #131316;
            color: #e5a93b;
            box-shadow: 0px 0px 10px 0px rgb(229 169 59 / 16%);
            transition: all 0.2s ease-in-out;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 35px;
        }

        a.btn.btn-outline-warning:hover {
            background-color: #e5a93b;
            color: #101010;
            transform: translateY(-3px);
            box-shadow: 0px 0px 20px rgba(229, 169, 59, 0.4);
        }
    </style>
</head>
<body th:style="|background-image: url('@{/img/SeleccionZonaFondo.jpg}'); background-size: cover; background-position: center; background-attachment: fixed;|">

<div class="container d-flex justify-content-center align-items-center py-5" style="min-height: 100vh;">
    <div class="col-md-10 text-center">

        <h1 style="color: var(--game-epic); text-shadow: 2px 2px 15px rgba(0,0,0,0.9), 0 0 10px rgba(229,169,59,0.7); font-weight: 800; font-size: 3rem;">
            Elige tu Destino
        </h1>
        <p class="lead mt-3 fw-bold" style="color: #d4d4d8; text-shadow: 1px 1px 10px rgba(0,0,0,0.9);">
            Tu mazo está listo. ¿A dónde vas a ir?
        </p>

        <div class="row mt-5 justify-content-center g-4">

            <div class="col-md-5">
                <div class="zona-card h-100 p-4" th:style="|--hover-bg: url('@{/img/Bosque.jpg}');|">
                    <div>
                        <h4 class="text-warning mb-3" style="font-weight: bold; text-shadow: 1px 1px 5px black;">Bosque Oscuro</h4>
                        <p style="text-shadow: 1px 1px 5px black;">Enemigos más simples. Ideal para probar tu mazo y practicar.</p>
                    </div>
                    <div class="mt-4">
                        <a th:href="@{/combate(zona='bosque')}" class="btn btn-danger w-100 fw-bold">Adentrarse</a>
                    </div>
                </div>
            </div>

            <div class="col-md-5">
                <div class="zona-card h-100 p-4" th:style="|--hover-bg: url('@{/img/Cueva.jpg}');|">
                    <div>
                        <h4 class="text-danger mb-3" style="font-weight: bold; text-shadow: 1px 1px 5px black;">Caverna del Dragón</h4>
                        <p style="text-shadow: 1px 1px 5px black;">Peligro extremo. Solo para los aventureros más experimentados dispuestos a todo.</p>
                    </div>
                    <div class="mt-4">
                        <a th:href="@{/combate(zona='caverna')}" class="btn btn-danger w-100 fw-bold">Entrar a la Cueva</a>
                    </div>
                </div>
            </div>

        </div>

        <div class="mt-5">
            <a th:href="@{/deckbuilding}" class="btn btn-outline-warning">
                Volver a editar mazo
            </a>
        </div>

    </div>
</div>

</body>
</html>
